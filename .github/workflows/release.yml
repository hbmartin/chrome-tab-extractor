name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run tests
        run: node --test
      - name: Package extension
        run: zip -r "tab-extractor-${{ github.ref_name }}.zip" manifest.json TabExtractor.js matcher.js icons LICENSE
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: tab-extractor-*.zip
          generate_release_notes: true
